<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Run 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero" id="hero">
      <div class="hud">
        <p class="eyebrow">FUTURE MOTION / 3D SHOWCASE</p>
        <h1>Car Running Through a Neon 3D World</h1>
        <p class="intro">
          A stylized single-page website with a moving road, glowing city depth, and a car that feels like it is racing into the screen.
        </p>
        <div class="cta-row">
          <button class="primary-button" id="launchButton" type="button">Launch Scene</button>
          <button class="ghost-button" id="boostButton" type="button">Boost Speed</button>
          <button class="ghost-button stop-button" id="stopButton" type="button">Stop</button>
        </div>
      </div>

      <section class="scene-wrap" id="scene" aria-label="Animated 3D car scene">
        <div class="scene" id="sceneFrame">
          <div class="three-layer" id="threeLayer" aria-hidden="true"></div>
          <div class="sky-glow sky-glow-left"></div>
          <div class="sky-glow sky-glow-right"></div>
          <div class="sun-core"></div>

          <div class="city city-back">
            <span></span><span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="city city-front">
            <span></span><span></span><span></span><span></span><span></span><span></span>
          </div>

          <div class="mountains">
            <span></span><span></span><span></span>
          </div>

          <div class="road-perspective">
            <div class="road-surface"></div>
            <div class="lane-grid"></div>
            <div class="road-shine"></div>
            <div class="road-edge road-edge-left"></div>
            <div class="road-edge road-edge-right"></div>
          </div>

          <div class="car" id="carBody">
            <div class="car-shadow"></div>
            <div class="car-glow"></div>
            <div class="car-shell">
              <div class="car-top"></div>
              <div class="car-window car-window-front"></div>
              <div class="car-window car-window-side"></div>
              <div class="car-light car-light-left"></div>
              <div class="car-light car-light-right"></div>
              <div class="headlight-beam beam-left"></div>
              <div class="headlight-beam beam-right"></div>
              <div class="exhaust exhaust-left"></div>
              <div class="exhaust exhaust-right"></div>
              <div class="wheel wheel-front"></div>
              <div class="wheel wheel-back"></div>
            </div>
          </div>

          <div class="speed-lines">
            <span></span><span></span><span></span><span></span><span></span><span></span>
          </div>

          <div class="dash">
            <div class="stat-card">
              <span>Mode</span>
              <strong>Hyperdrive</strong>
            </div>
            <div class="stat-card">
              <span>Speed</span>
              <strong id="speedReadout">148 KM/H</strong>
            </div>
            <div class="stat-card">
              <span>Depth</span>
              <strong>3D Perspective</strong>
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
